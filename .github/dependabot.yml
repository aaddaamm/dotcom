version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '13:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
