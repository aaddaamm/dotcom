name: Link Check

on:
  schedule:
    - cron: '30 14 * * 1'
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run link check
        env:
          SITE_URL: https://adamrobinson.tech
        run: npm run check:links
