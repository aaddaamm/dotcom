name: Lighthouse SEO + Accessibility

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse gate
        env:
          LH_MIN_ACCESSIBILITY: '0.96'
          LH_MIN_SEO: '1'
          LH_REPORT_DIR: lighthouse-reports
        run: npm run check:lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-reports
          path: lighthouse-reports/*.json
