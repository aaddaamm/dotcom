<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="referrer" content="strict-origin-when-cross-origin" />
		<meta property="og:site_name" content="Adam Robinson" />
		<meta property="og:locale" content="en_US" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/Inter-VariableFont_slnt,wght.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link rel="dns-prefetch" href="https://www.goodreads.com" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="sitemap" type="application/xml" href="/sitemap.xml" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				var stored = localStorage.getItem('theme');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var theme = stored || (prefersDark ? 'dark' : 'light');
				document.documentElement.setAttribute('data-theme', theme);
				document
					.querySelector('meta[name="theme-color"]')
					.setAttribute('content', theme === 'dark' ? '#0a0a0a' : '#fafafa');
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
