<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Adam Robinson" />
		<meta property="og:locale" content="en_US" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/Inter-VariableFont_slnt,wght.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link rel="preload" href="%sveltekit.assets%/icon.svg" as="image" type="image/svg+xml" />
		<link rel="preload" href="%sveltekit.assets%/logo-dark.svg" as="image" type="image/svg+xml" />
		<link rel="dns-prefetch" href="https://vitals.vercel-insights.com" />
		<link rel="dns-prefetch" href="https://va.vercel-scripts.com" />
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Adam Robinson",
				"jobTitle": "Lead Software Engineer",
				"description": "Lead Software Engineer building backend systems and workflow-driven platforms that support complex, real-world applications.",
				"url": "https://adamrobinson.tech",
				"email": "adam@adamrobinson.tech",
				"address": {
					"@type": "PostalAddress",
					"addressLocality": "Providence",
					"addressRegion": "RI",
					"addressCountry": "US"
				},
				"knowsAbout": ["Backend Development", "Workflow Systems", "Full-Stack Engineering", "System Design", "AI-Assisted Development"],
				"sameAs": ["https://github.com/aaddaamm", "https://linkedin.com/in/adam-robinson-software"]
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function() {
				var stored = localStorage.getItem('theme');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var theme = stored || (prefersDark ? 'dark' : 'light');
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
