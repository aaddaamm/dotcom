<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="robots" content="index, follow" />
		<meta name="referrer" content="strict-origin-when-cross-origin" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Adam Robinson" />
		<meta property="og:locale" content="en_US" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/Inter-VariableFont_slnt,wght.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link rel="preconnect" href="https://vitals.vercel-insights.com" />
		<link rel="preconnect" href="https://va.vercel-scripts.com" />
		<link rel="dns-prefetch" href="https://www.goodreads.com" />
		<link rel="preload" href="%sveltekit.assets%/icon.svg" as="image" type="image/svg+xml" />
		<link rel="preload" href="%sveltekit.assets%/logo-dark.svg" as="image" type="image/svg+xml" />
		<link rel="preload" href="%sveltekit.assets%/logo-light.svg" as="image" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="sitemap" type="application/xml" href="/api/sitemap" />
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Adam Robinson",
				"jobTitle": "Senior Software Engineer",
				"description": "Senior software engineer with ten-plus years across fintech, healthcare, and enterprise. Full-stack, backend-leaning.",
				"url": "https://adamrobinson.tech",
				"email": "adam@adamrobinson.tech",
				"address": {
					"@type": "PostalAddress",
					"addressLocality": "Cranston",
					"addressRegion": "RI",
					"addressCountry": "US"
				},
				"knowsAbout": [
					"React",
					"TypeScript",
					"Node.js",
					"Ruby on Rails",
					"Vue",
					"Next.js",
					"Full-stack development",
					"Backend engineering",
					"Technical leadership",
					"Staff augmentation",
					"Platform modernization"
				],
				"sameAs": ["https://github.com/aaddaamm", "https://linkedin.com/in/adam-robinson-software"]
			}
		</script>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebSite",
				"name": "Adam Robinson",
				"url": "https://adamrobinson.tech",
				"description": "Senior software engineer with ten-plus years across fintech, healthcare, and enterprise.",
				"inLanguage": "en-US",
				"author": {
					"@type": "Person",
					"name": "Adam Robinson"
				}
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				var stored = localStorage.getItem('theme');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var theme = stored || (prefersDark ? 'dark' : 'light');
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
